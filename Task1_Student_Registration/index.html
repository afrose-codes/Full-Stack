<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

<h2>Student Registration</h2>

<form action="register.php" method="post">

    Email: <input type="email" name="email"><br><br>

    Department:

        <option>IT</option>

    <input type="submit" value="Register">
</form>
